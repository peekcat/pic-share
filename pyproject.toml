[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "picshare"
version = "0.4.0"
description = "基于 IPv6 的私有照片共享服务器(极速预览 · 智能缓存 · 安全访问)"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "Flask>=2.0",
    "Pillow>=9.0",
]

[project.scripts]
picshare = "picshare.gui:main"

[tool.setuptools.packages.find]
where = ["src"]
